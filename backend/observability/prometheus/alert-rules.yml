groups:
  - name: worksync-api-alerts
    rules:
      - alert: WorksyncHighP95Latency
        expr: histogram_quantile(0.95, sum(rate(worksync_http_request_duration_seconds_bucket[5m])) by (le, route)) > 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on API route"
          description: "p95 latency has been above 300ms for at least 10 minutes."

      - alert: WorksyncHighErrorRate
        expr: (sum(rate(worksync_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(worksync_http_requests_total[5m]))) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate"
          description: "5xx error ratio exceeded 1% for 5 minutes."

      - alert: WorksyncBackendDown
        expr: up{job="worksync-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "WorkSync backend target down"
          description: "Prometheus cannot scrape worksync-backend for 2 minutes."
